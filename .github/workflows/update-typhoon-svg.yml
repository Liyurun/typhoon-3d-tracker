name: Update Typhoon Track SVG

on:
  schedule:
    - cron: "0 */3 * * *"   # 每 3 小时运行一次（UTC）
  workflow_dispatch:         # 支持手动触发

permissions:
  contents: write

concurrency:
  group: typhoon-svg
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate typhoon track SVG
        run: node scripts/generate-typhoon-svg.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain assets/typhoon-latest.svg)" ]; then
            git add assets/typhoon-latest.svg
            git commit -m "chore: 自动更新台风实时路径图 [skip ci]"
            git push
          else
            echo "台风路径无变化，跳过提交"
          fi
